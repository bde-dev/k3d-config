apiVersion: v1
kind: ServiceAccount
metadata:
  name: my-daemonset-collector
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: my-daemonset-collector-cr
rules:
  - apiGroups: ['']
    resources: ['nodes/stats']
    verbs: ['get', 'watch', 'list']
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: my-daemonset-collector-crb
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: my-daemonset-collector-cr
subjects:
  - kind: ServiceAccount
    name: my-daemonset-collector
    namespace: default

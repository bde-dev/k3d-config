apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: prometheus-lab
  namespace: monitoring
  annotations:
spec:
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: prometheus-lab-kube-promet-prometheus
                port:
                  number: 9090
